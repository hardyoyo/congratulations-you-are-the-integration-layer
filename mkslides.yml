slides:
  theme: solarized
  separator_vertical: "^----$"
  title: "Congratulations, You're the Integration Layer Now"
  highlight_theme: stackoverflow-light

revealjs:
  transition: slide
  history: true
  slideNumber: "c/t"

plugins:
  - extra_css:
      - custom.css
  - name: RevealMermaid
    extra_javascript:
      - https://cdn.jsdelivr.net/npm/reveal.js-mermaid-plugin/plugin/mermaid/mermaid.min.js
